<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Completion Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #0b0b0b; }
    @media (prefers-color-scheme: dark) { body { background: #1a1a19; color: #ffffff; } }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 28px; font-weight: 600; margin: 0; }
    .filter-bar { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 2rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    @media (prefers-color-scheme: dark) { .filter-bar { background: #242423; border-color: #444; } }
    .filter-label { font-size: 12px; font-weight: 600; color: #666; margin-right: 8px; }
    @media (prefers-color-scheme: dark) { .filter-label { color: #aaa; } }
    .filter-btn { padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .filter-btn:hover { border-color: #999; }
    .filter-btn.active { background: #378add; color: white; border-color: #378add; }
    @media (prefers-color-scheme: dark) { .filter-btn { background: #333; border-color: #555; color: #fff; } .filter-btn:hover { border-color: #777; } }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 2rem; }
    .kpi-card { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0; }
    @media (prefers-color-scheme: dark) { .kpi-card { background: #242423; border-color: #444; } }
    .kpi-label { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: 500; }
    @media (prefers-color-scheme: dark) { .kpi-label { color: #aaa; } }
    .kpi-value { font-size: 36px; font-weight: 600; margin-bottom: 4px; }
    .kpi-sub { font-size: 12px; color: #999; }
    @media (prefers-color-scheme: dark) { .kpi-sub { color: #777; } }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
    @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
    .chart-card { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0; }
    @media (prefers-color-scheme: dark) { .chart-card { background: #242423; border-color: #444; } }
    .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .chart-container { position: relative; height: 280px; }
    .email-list { list-style: none; }
    .email-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    @media (prefers-color-scheme: dark) { .email-item { border-color: #333; } }
    .email-type { color: #666; text-transform: capitalize; }
    @media (prefers-color-scheme: dark) { .email-type { color: #aaa; } }
    .email-count { font-weight: 600; }
    .loading { text-align: center; padding: 2rem; color: #666; }
    .error { padding: 2rem; background: #fee; border-radius: 8px; color: #c33; border: 1px solid #fcc; }
    .footer { text-align: center; font-size: 12px; color: #999; border-top: 1px solid #e0e0e0; padding-top: 1rem; margin-top: 2rem; }
    @media (prefers-color-scheme: dark) { .footer { border-color: #444; color: #777; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    function Dashboard() {
      const [metrics, setMetrics] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [dateRange, setDateRange] = useState('all');
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const calculateDateRange = (rangeType) => {
        const now = new Date();
        let start;
        const end = now;
        switch (rangeType) {
          case '7d':
            start = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            break;
          case '30d':
            start = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            break;
          case '90d':
            start = new Date(now.getTime() - 90 * 24 * 60 * 60 * 1000);
            break;
          default:
            start = new Date(0);
        }
        return { start, end };
      };
      const fetchAndCalculateMetrics = async (rangeType) => {
        try {
          setLoading(true);
          const response = await fetch('/api/students');
          if (!response.ok) throw new Error('Failed to fetch data');
          const data = await response.json();
          const records = data.records || [];
          const { start, end } = calculateDateRange(rangeType);
          const students = records.map((r) => ({
            status: r.fields.status || 'unknown',
            percent_complete: r.fields.percent_complete || 0,
            enrollment_date: r.fields.enrollment_date,
            last_email_type: r.fields.last_email_type || 'none',
            last_email_date: r.fields.last_email_date,
          }));
          const filteredByDate = students.filter((s) => s.last_email_date && new Date(s.last_email_date) >= start && new Date(s.last_email_date) <= end);
          const completed = students.filter((s) => s.status === 'completed');
          const completionRate = students.length > 0 ? Math.round((completed.length / students.length) * 100) : 0;
          const atRiskCount = students.filter((s) => {
            if (s.status === 'completed') return false;
            if (s.last_email_date) {
              const daysSince = Math.floor((new Date() - new Date(s.last_email_date)) / (1000 * 60 * 60 * 24));
              return daysSince >= 7;
            }
            return false;
          }).length;
          const emailsByType = {};
          filteredByDate.forEach((s) => {
            const type = s.last_email_type || 'none';
            emailsByType[type] = (emailsByType[type] || 0) + 1;
          });
          const totalEmailsSent = Object.values(emailsByType).reduce((a, b) => a + b, 0);
          const progressBuckets = {
            '0-25%': students.filter((s) => s.percent_complete >= 0 && s.percent_complete < 25).length,
            '25-50%': students.filter((s) => s.percent_complete >= 25 && s.percent_complete < 50).length,
            '50-75%': students.filter((s) => s.percent_complete >= 50 && s.percent_complete < 75).length,
            '75-100%': students.filter((s) => s.percent_complete >= 75 && s.percent_complete < 100).length,
            '100%': students.filter((s) => s.percent_complete === 100).length,
          };
          setMetrics({ completionRate, atRiskCount, emailsByType, totalEmailsSent, progressBuckets, totalStudents: students.length });
          setError(null);
        } catch (err) {
          setError(err.message || 'Failed to load data');
        } finally {
          setLoading(false);
        }
      };
      useEffect(() => { fetchAndCalculateMetrics(dateRange); }, [dateRange]);
      useEffect(() => {
        if (metrics && chartRef.current && !loading) {
          const ctx = chartRef.current.getContext('2d');
          if (chartInstance.current) { chartInstance.current.destroy(); }
          chartInstance.current = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: ['0-25%', '25-50%', '50-75%', '75-100%', '100%'],
              datasets: [{ data: [metrics.progressBuckets['0-25%'], metrics.progressBuckets['25-50%'], metrics.progressBuckets['50-75%'], metrics.progressBuckets['75-100%'], metrics.progressBuckets['100%']], backgroundColor: ['#e24b4a', '#ba7517', '#639922', '#3b6d11', '#199e70'] }],
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 16 } } } },
          });
        }
        return () => { if (chartInstance.current) { chartInstance.current.destroy(); } };
      }, [metrics, loading]);
      if (error) { return (<div className="container"><div className="error">Error: {error}</div></div>); }
      return (<div><div className="container"><div className="header"><h1>Student Completion Dashboard</h1></div><div className="filter-bar"><span className="filter-label">Time period:</span>{['7d', '30d', '90d', 'all'].map((range) => (<button key={range} className={`filter-btn ${dateRange === range ? 'active' : ''}`} onClick={() => setDateRange(range)}>{range === '7d' ? 'Last 7 days' : range === '30d' ? 'Last 30 days' : range === '90d' ? 'Last 90 days' : 'All time'}</button>))}</div>{loading && <div className="loading">Loading dashboard...</div>}{!loading && metrics && (<><div className="kpi-grid"><div className="kpi-card"><div className="kpi-label">Completion rate</div><div className="kpi-value">{metrics.completionRate}%</div><div className="kpi-sub">{metrics.totalStudents} total students</div></div><div className="kpi-card"><div className="kpi-label">At-risk students</div><div className="kpi-value">{metrics.atRiskCount}</div><div className="kpi-sub">Silent 7+ days</div></div><div className="kpi-card"><div className="kpi-label">Total emails sent</div><div className="kpi-value">{metrics.totalEmailsSent}</div><div className="kpi-sub">This period</div></div></div><div className="chart-grid"><div className="chart-card"><div className="chart-title">Progress distribution</div><div className="chart-container"><canvas ref={chartRef} /></div></div><div className="chart-card"><div className="chart-title">Emails by type</div><ul className="email-list">{Object.entries(metrics.emailsByType).map(([type, count]) => (<li key={type} className="email-item"><span className="email-type">{type}</span><span className="email-count">{count}</span></li>))}</ul></div></div><div className="footer">Data synced from Airtable. Last updated: {new Date().toLocaleString()}</div></>) }
      </div></div>);
    }
    ReactDOM.render(<Dashboard />, document.getElementById('root'));
  </script>
</body>
</html>
